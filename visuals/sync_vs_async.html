  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'IBM Plex Sans';\n  font-style: normal;\n  font-weight: 600;\n  font-stretch: 100%;\n  font-display: swap;\n  src: url(\"ea270b12-c5de-4b59-8c2c-f7a19397a864\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n<style>\n  html, body { margin: 0; background: #0a0e17; }\n  * { box-sizing: border-box; }\n  @keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-5px)} 75%{transform:translateX(5px)} }\n  input[type=range]{ -webkit-appearance:none; appearance:none; height:4px; border-radius:4px; background:#283247; outline:none; }\n  input[type=range]::-webkit-slider-thumb{ -webkit-appearance:none; appearance:none; width:16px; height:16px; border-radius:50%; background:#e6edf7; cursor:pointer; box-shadow:0 0 0 3px rgba(255,255,255,.08); }\n  input[type=range]::-moz-range-thumb{ width:16px; height:16px; border:none; border-radius:50%; background:#e6edf7; cursor:pointer; }\n<\u002Fstyle>\n<\u002Fhelmet>\n<div ref=\"{{ setRoot }}\" style=\"min-height:100vh; background:radial-gradient(1200px 600px at 50% -10%, #121a2c 0%, #0a0e17 60%); color:#e6edf7; font-family:'IBM Plex Sans',system-ui,sans-serif; padding:32px 28px 48px;\">\n\n  <div style=\"max-width:1080px; margin:0 auto;\">\n\n    <!-- Header -->\n    <div style=\"margin-bottom:6px; display:flex; align-items:baseline; gap:14px; flex-wrap:wrap;\">\n      <h1 style=\"font-size:26px; font-weight:600; letter-spacing:-0.01em; margin:0;\">Synchronous vs. Self-Timed<\u002Fh1>\n      <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; color:#8b97ad;\">a race between two ways of finishing a computation<\u002Fspan>\n    <\u002Fdiv>\n    <p style=\"color:#9aa6bb; font-size:14px; line-height:1.6; max-width:760px; margin:0 0 24px;\">\n      A signal has to travel through <b style=\"color:#e6edf7;\">4 logic gates<\u002Fb>, each adding a little delay. Watch how each design decides\n      <i>when the answer is ready<\u002Fi>. One waits for a fixed clock tick. The other listens for the work to actually finish.\n    <\u002Fp>\n\n    <!-- ============ SYNCHRONOUS TRACK ============ -->\n    <div data-screen-label=\"Synchronous track\" style=\"background:#0e1422; border:1px solid #1c2740; border-radius:14px; padding:18px 20px 20px; margin-bottom:18px;\">\n      <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:4px;\">\n        <span style=\"width:9px; height:9px; border-radius:50%; background:#4aa3ff; box-shadow:0 0 10px #4aa3ff;\"><\u002Fspan>\n        <span style=\"font-weight:600; font-size:15px;\">Synchronous<\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:#7d8aa3;\">— a clock ticks at a fixed beat; the answer is read at the tick, whether or not it's ready<\u002Fspan>\n      <\u002Fdiv>\n\n      <div data-track=\"sync\" style=\"position:relative; height:128px; border-radius:10px; background:linear-gradient(#0b1120,#0a0f1c); border:1px solid #16203a; overflow:hidden; margin-top:10px;\">\n        <!-- clock sweep bar -->\n        <div data-clockbar=\"\" style=\"position:absolute; top:0; left:0; width:2px; height:100%; background:linear-gradient(#4aa3ff,rgba(74,163,255,0)); box-shadow:0 0 16px rgba(74,163,255,.7); opacity:.9;\"><\u002Fdiv>\n        <div data-clocklabel=\"\" style=\"position:absolute; top:6px; left:0; transform:translateX(-50%); font-family:'IBM Plex Mono',monospace; font-size:10px; color:#6fb4ff; white-space:nowrap;\">clock<\u002Fdiv>\n        <!-- moving signal pulse -->\n        <div data-pulse=\"\" style=\"position:absolute; top:50%; left:0; margin-top:-8px; margin-left:-8px; width:16px; height:16px; border-radius:50%; background:#4aa3ff; box-shadow:0 0 18px 4px rgba(74,163,255,.85); opacity:0;\"><\u002Fdiv>\n        <!-- gate row -->\n        <div style=\"position:absolute; inset:0; display:flex; align-items:center; gap:0; padding:0 18px;\">\n          <div data-node=\"in\" style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#7d8aa3; width:34px; text-align:center; flex:0 0 auto;\">IN<\u002Fdiv>\n          <sc-for list=\"{{ gateList }}\" as=\"g\" hint-placeholder-count=\"4\">\n            <div style=\"flex:1 1 0; display:flex; align-items:center;\">\n              <div style=\"height:2px; flex:1; background:#1f2c49;\"><\u002Fdiv>\n              <div data-gate=\"{{ $index }}\" style=\"position:relative; flex:0 0 auto; width:78px; height:54px; border-radius:9px; background:#0f1830; border:1px solid #243352; display:flex; align-items:center; justify-content:center; transition:box-shadow .12s, border-color .12s, background .12s;\">\n                <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#9fb0cc;\">Gate {{ g.n }}<\u002Fspan>\n                <span data-done=\"\" style=\"position:absolute; top:-8px; right:-8px; width:18px; height:18px; border-radius:50%; background:#46d6a0; color:#06231a; font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .15s; box-shadow:0 0 10px rgba(70,214,160,.7);\">✓<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"height:2px; flex:1; background:#1f2c49;\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <div data-lamp=\"\" style=\"flex:0 0 auto; width:54px; height:54px; border-radius:50%; margin-left:6px; background:#0f1830; border:1px solid #243352; display:flex; align-items:center; justify-content:center; font-family:'IBM Plex Mono',monospace; font-size:13px; font-weight:600; color:#5b6b88; transition:all .12s;\">OUT<\u002Fdiv>\n        <\u002Fdiv>\n        <!-- status caption -->\n        <div data-status=\"\" style=\"position:absolute; bottom:8px; left:0; width:100%; text-align:center; font-family:'IBM Plex Mono',monospace; font-size:11px; color:#6c7a96; min-height:14px;\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ============ SELF-TIMED TRACK ============ -->\n    <div data-screen-label=\"Self-timed track\" style=\"background:#0e1422; border:1px solid #2a2415; border-radius:14px; padding:18px 20px 20px; margin-bottom:22px;\">\n      <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:4px;\">\n        <span style=\"width:9px; height:9px; border-radius:50%; background:#f6a93b; box-shadow:0 0 10px #f6a93b;\"><\u002Fspan>\n        <span style=\"font-weight:600; font-size:15px;\">Self-Timed<\u002Fspan>\n        <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:#9d8657;\">— each gate sends a glowing “done” token forward; the dotted line is the acknowledge sent back. The answer is ready the instant the last token arrives<\u002Fspan>\n      <\u002Fdiv>\n\n      <div data-track=\"st\" style=\"position:relative; height:128px; border-radius:10px; background:linear-gradient(#1a140a,#120d06); border:1px solid #33270f; overflow:hidden; margin-top:10px;\">\n        <div data-pulse=\"\" style=\"position:absolute; top:50%; left:0; margin-top:-8px; margin-left:-8px; width:16px; height:16px; border-radius:50%; background:#f6a93b; box-shadow:0 0 18px 4px rgba(246,169,59,.85); opacity:0;\"><\u002Fdiv>\n        <div style=\"position:absolute; inset:0; display:flex; align-items:center; gap:0; padding:0 18px;\">\n          <div data-node=\"in\" style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#9d8657; width:34px; text-align:center; flex:0 0 auto;\">IN<\u002Fdiv>\n          <sc-for list=\"{{ gateList }}\" as=\"g\" hint-placeholder-count=\"4\">\n            <div style=\"flex:1 1 0; display:flex; align-items:center;\">\n              <div style=\"position:relative; flex:1; height:28px;\">\n                <div style=\"position:absolute; left:0; right:0; top:50%; margin-top:-1px; height:2px; background:#5a4a22;\"><\u002Fdiv>\n                <div style=\"position:absolute; left:3px; right:3px; top:50%; margin-top:9px; height:0; border-top:1px dashed #6b5526;\"><\u002Fdiv>\n              <\u002Fdiv>\n              <div data-gate=\"{{ $index }}\" style=\"position:relative; flex:0 0 auto; width:78px; height:54px; border-radius:9px; background:#1d160b; border:1px solid #4a3a16; display:flex; align-items:center; justify-content:center; transition:box-shadow .12s, border-color .12s, background .12s;\">\n                <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11px; color:#d8b577;\">Gate {{ g.n }}<\u002Fspan>\n                <span data-done=\"\" style=\"position:absolute; top:-8px; right:-8px; width:18px; height:18px; border-radius:50%; background:#f6a93b; color:#2b1c04; font-size:11px; font-weight:700; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity .15s; box-shadow:0 0 10px rgba(246,169,59,.7);\">✓<\u002Fspan>\n              <\u002Fdiv>\n              <div style=\"position:relative; flex:1; height:28px;\">\n                <div style=\"position:absolute; left:0; right:0; top:50%; margin-top:-1px; height:2px; background:#5a4a22;\"><\u002Fdiv>\n                <div style=\"position:absolute; left:3px; right:3px; top:50%; margin-top:9px; height:0; border-top:1px dashed #6b5526;\"><\u002Fdiv>\n              <\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fsc-for>\n          <div data-lamp=\"\" style=\"flex:0 0 auto; width:54px; height:54px; border-radius:50%; margin-left:6px; background:#1d160b; border:1px solid #4a3a16; display:flex; align-items:center; justify-content:center; font-family:'IBM Plex Mono',monospace; font-size:13px; font-weight:600; color:#8a7140; transition:all .12s;\">OUT<\u002Fdiv>\n        <\u002Fdiv>\n        <div data-status=\"\" style=\"position:absolute; bottom:8px; left:0; width:100%; text-align:center; font-family:'IBM Plex Mono',monospace; font-size:11px; color:#9d8657; min-height:14px;\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ============ CONTROL PANEL ============ -->\n    <div style=\"display:grid; grid-template-columns:1.15fr 1fr; gap:18px;\">\n\n      <!-- left: controls -->\n      <div style=\"background:#0e1422; border:1px solid #1c2740; border-radius:14px; padding:20px;\">\n        <div style=\"display:flex; align-items:center; justify-content:space-between; margin-bottom:16px;\">\n          <span style=\"font-weight:600; font-size:14px;\">Controls<\u002Fspan>\n          <div style=\"display:flex; gap:8px;\">\n            <button onclick=\"{{ onToggleRun }}\" style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; padding:6px 12px; border-radius:7px; border:1px solid #2a3a5c; background:#15203a; color:#cdd8ec; cursor:pointer;\">{{ runLabel }}<\u002Fbutton>\n            <button onclick=\"{{ onReset }}\" style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; padding:6px 12px; border-radius:7px; border:1px solid #2a3a5c; background:#101725; color:#9aa6bb; cursor:pointer;\">reset<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- gate speed -->\n        <div style=\"margin-bottom:18px;\">\n          <div style=\"display:flex; justify-content:space-between; align-items:baseline; margin-bottom:8px;\">\n            <label style=\"font-size:13px; color:#cdd8ec;\">Gate speed <span style=\"color:#7d8aa3; font-size:11.5px;\">(affects both tracks)<\u002Fspan><\u002Flabel>\n            <span style=\"font-family:'IBM Plex Mono',monospace; font-size:12px; color:#4aa3ff;\">{{ speedLabel }}<\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:10px;\">\n            <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; color:#6c7a96;\">slow<\u002Fspan>\n            <input type=\"range\" min=\"0.4\" max=\"2.6\" step=\"0.1\" value=\"{{ speed }}\" onchange=\"{{ onSpeed }}\" style=\"flex:1;\">\n            <span style=\"font-family:'IBM Plex Mono',monospace; font-size:10px; color:#6c7a96;\">fast<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <!-- per-gate knobs -->\n        <div style=\"margin-bottom:6px; font-size:13px; color:#cdd8ec;\">Gate delays\n          <span style=\"color:#7d8aa3; font-size:11.5px;\">— make one gate slow and watch the clock stretch for everyone<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:1fr 1fr; gap:12px 18px; margin-top:10px;\">\n          <sc-for list=\"{{ gateKnobs }}\" as=\"k\" hint-placeholder-count=\"4\">\n            <div>\n              <div style=\"display:flex; justify-content:space-between; margin-bottom:5px;\">\n                <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:#9fb0cc;\">{{ k.label }}<\u002Fspan>\n                <span style=\"font-family:'IBM Plex Mono',monospace; font-size:11.5px; color:#8b97ad;\">{{ k.display }}<\u002Fspan>\n              <\u002Fdiv>\n              <input type=\"range\" min=\"1\" max=\"9\" step=\"1\" value=\"{{ k.value }}\" onchange=\"{{ k.onChange }}\" style=\"width:100%;\">\n            <\u002Fdiv>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n\n        <!-- randomize -->\n        <div style=\"margin-top:18px; padding-top:16px; border-top:1px solid #1c2740; display:flex; align-items:center; gap:12px;\">\n          <button onclick=\"{{ onToggleRandomize }}\" style=\"font-family:'IBM Plex Mono',monospace; font-size:12.5px; padding:9px 14px; border-radius:8px; border:1px solid {{ randBorder }}; background:{{ randBg }}; color:{{ randColor }}; cursor:pointer; font-weight:500;\">⚡ Randomize delays {{ randState }}<\u002Fbutton>\n          <span style=\"font-size:11.5px; color:#7d8aa3; line-height:1.4;\">Real chips vary cycle-to-cycle. This jitters each gate randomly — the moment of truth.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- right: scoreboard -->\n      <div style=\"background:#0e1422; border:1px solid #1c2740; border-radius:14px; padding:20px; display:flex; flex-direction:column;\">\n        <div style=\"font-weight:600; font-size:14px; margin-bottom:16px;\">Scoreboard<\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:auto 1fr 1fr; gap:0; font-family:'IBM Plex Mono',monospace;\">\n          <!-- header row -->\n          <div><\u002Fdiv>\n          <div style=\"text-align:center; padding-bottom:12px; display:flex; flex-direction:column; align-items:center; gap:4px;\"><span style=\"width:8px;height:8px;border-radius:50%;background:#4aa3ff;box-shadow:0 0 8px #4aa3ff;\"><\u002Fspan><span style=\"font-size:11px; color:#9fb0cc;\">Sync<\u002Fspan><\u002Fdiv>\n          <div style=\"text-align:center; padding-bottom:12px; display:flex; flex-direction:column; align-items:center; gap:4px;\"><span style=\"width:8px;height:8px;border-radius:50%;background:#f6a93b;box-shadow:0 0 8px #f6a93b;\"><\u002Fspan><span style=\"font-size:11px; color:#d8b577;\">Self-Timed<\u002Fspan><\u002Fdiv>\n\n          <div style=\"font-size:12px; color:#8b97ad; padding:10px 0; border-top:1px solid #1c2740;\">completed<\u002Fdiv>\n          <div style=\"font-size:22px; text-align:center; padding:8px 0; border-top:1px solid #1c2740; color:#e6edf7;\">{{ sync.completed }}<\u002Fdiv>\n          <div style=\"font-size:22px; text-align:center; padding:8px 0; border-top:1px solid #1c2740; color:#e6edf7;\">{{ st.completed }}<\u002Fdiv>\n\n          <div style=\"font-size:12px; color:#8b97ad; padding:10px 0; border-top:1px solid #1c2740;\">errors<\u002Fdiv>\n          <div data-syncerr=\"\" style=\"font-size:22px; text-align:center; padding:8px 0; border-top:1px solid #1c2740; color:{{ sync.errColor }};\">{{ sync.errors }}<\u002Fdiv>\n          <div style=\"font-size:22px; text-align:center; padding:8px 0; border-top:1px solid #1c2740; color:#46d6a0;\">{{ st.errors }}<\u002Fdiv>\n\n          <div style=\"font-size:12px; color:#8b97ad; padding:10px 0; border-top:1px solid #1c2740;\">avg latency<\u002Fdiv>\n          <div style=\"font-size:18px; text-align:center; padding:11px 0; border-top:1px solid #1c2740; color:#4aa3ff;\">{{ sync.avg }}<\u002Fdiv>\n          <div style=\"font-size:18px; text-align:center; padding:11px 0; border-top:1px solid #1c2740; color:#f6a93b;\">{{ st.avg }}<\u002Fdiv>\n        <\u002Fdiv>\n\n        <div style=\"margin-top:auto; padding-top:16px;\">\n          <div data-verdict=\"\" style=\"font-size:12.5px; line-height:1.55; color:#8b97ad; background:#0b1120; border:1px solid #16203a; border-radius:9px; padding:11px 13px; min-height:54px;\">{{ verdict }}<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  state = {\n    speed: 1,\n    delays: [3, 3, 3, 3],\n    randomize: false,\n    running: true,\n    syncDone: 0, syncErr: 0, syncSum: 0, syncN: 0,\n    stDone: 0, stSum: 0, stN: 0,\n  };\n\n  BASE = 200;      // ms per delay unit at speed 1\n  MARGIN = 1.3;    // clock budget headroom over configured total\n  GAP = 320;       // ms the ST output is held before next cycle\n\n  setRoot = (el) => { this.root = el; };\n\n  componentDidMount() {\n    this.sync = {};\n    this.st = {};\n    this.t = 0;\n    this.lastNow = null;\n    this.cacheDom();\n    this._raf = requestAnimationFrame(this.loop);\n    this._onResize = () => {\n      this.cacheDom();\n      if (this.sync.cycleStart != null) this.sync.geom = this.geomFor('sync');\n      if (this.st.cycleStart != null) this.st.geom = this.geomFor('st');\n    };\n    window.addEventListener('resize', this._onResize);\n  }\n  componentWillUnmount() {\n    cancelAnimationFrame(this._raf);\n    window.removeEventListener('resize', this._onResize);\n  }\n\n  cacheDom() {\n    const grab = (sel) => {\n      const lane = this.root.querySelector(`[data-track=\"${sel}\"]`);\n      return {\n        lane,\n        pulse: lane.querySelector('[data-pulse]'),\n        clock: lane.querySelector('[data-clockbar]'),\n        clockLabel: lane.querySelector('[data-clocklabel]'),\n        gates: [...lane.querySelectorAll('[data-gate]')],\n        dones: [...lane.querySelectorAll('[data-done]')],\n        lamp: lane.querySelector('[data-lamp]'),\n        status: lane.querySelector('[data-status]'),\n      };\n    };\n    this.dom = { sync: grab('sync'), st: grab('st') };\n  }\n\n  // --- timing helpers ------------------------------------------------\n  drawDelays() {\n    const { delays, randomize } = this.state;\n    return delays.map((d) => randomize ? d * (0.45 + Math.random() * 1.5) : d);\n  }\n  // The clock is a fixed metronome, set at DESIGN time from the configured\n  // gate-delay knobs (+ headroom). It does NOT depend on the speed slider —\n  // so running the gates slower than designed makes the signal overrun the\n  // clock and the answer is sampled wrong.\n  clockBudgetMs() {\n    const sum = this.state.delays.reduce((a, b) => a + b, 0);\n    return sum * this.BASE * this.MARGIN;\n  }\n\n  geomFor(track) {\n    const d = this.dom[track];\n    const laneW = d.lane.clientWidth;\n    const gates = d.gates.map((g) => ({ left: g.offsetLeft, width: g.offsetWidth, mid: g.offsetLeft + g.offsetWidth / 2 }));\n    const lampMid = d.lamp.offsetLeft + d.lamp.offsetWidth / 2;\n    return { laneW, gates, lampMid };\n  }\n\n  startCycle(track) {\n    const T = this[track];\n    const raw = this.drawDelays();                 // delay units\n    const ms = raw.map((u) => (u * this.BASE) / this.state.speed);\n    const total = ms.reduce((a, b) => a + b, 0);\n    const cum = []; let acc = 0;\n    for (const m of ms) { cum.push(acc); acc += m; }\n    T.ms = ms; T.total = total; T.cum = cum;\n    T.cycleStart = this.t;\n    T.ready = false;\n    T.sampled = false;\n    T.geom = this.geomFor(track);\n    if (track === 'sync') T.period = Math.max(this.clockBudgetMs(), 1);\n    // reset visuals\n    const d = this.dom[track];\n    d.dones.forEach((x) => x.style.opacity = '0');\n    d.gates.forEach((g) => this.clearGate(track, g));\n    d.pulse.style.opacity = '0';\n    d.status.textContent = '';\n    this.setLamp(track, 'idle');\n  }\n\n  clearGate(track, g) {\n    if (track === 'sync') { g.style.boxShadow = 'none'; g.style.borderColor = '#243352'; g.style.background = '#0f1830'; }\n    else { g.style.boxShadow = 'none'; g.style.borderColor = '#4a3a16'; g.style.background = '#1d160b'; }\n  }\n  glowGate(track, g) {\n    if (track === 'sync') { g.style.boxShadow = '0 0 22px rgba(74,163,255,.55)'; g.style.borderColor = '#4aa3ff'; g.style.background = '#13233f'; }\n    else { g.style.boxShadow = '0 0 22px rgba(246,169,59,.55)'; g.style.borderColor = '#f6a93b'; g.style.background = '#2a1f0c'; }\n  }\n\n  setLamp(track, mode) {\n    const l = this.dom[track].lamp;\n    if (track === 'sync') {\n      if (mode === 'idle')   { l.style.background = '#0f1830'; l.style.borderColor = '#243352'; l.style.color = '#5b6b88'; l.style.boxShadow = 'none'; l.textContent = 'OUT'; }\n      if (mode === 'wait')   { l.style.background = '#0f1830'; l.style.borderColor = '#2c3e63'; l.style.color = '#46d6a0'; l.style.boxShadow = '0 0 12px rgba(70,214,160,.25)'; l.textContent = '✓'; l.style.opacity = '0.45'; }\n      if (mode === 'ok')     { l.style.background = '#13233f'; l.style.borderColor = '#4aa3ff'; l.style.color = '#bfe0ff'; l.style.boxShadow = '0 0 26px rgba(74,163,255,.85)'; l.textContent = '✓'; l.style.opacity = '1'; }\n      if (mode === 'err')    { l.style.background = '#3a0f18'; l.style.borderColor = '#ff5470'; l.style.color = '#ffd0d8'; l.style.boxShadow = '0 0 30px rgba(255,84,112,.9)'; l.textContent = '✗'; l.style.opacity = '1'; }\n    } else {\n      if (mode === 'idle')   { l.style.background = '#1d160b'; l.style.borderColor = '#4a3a16'; l.style.color = '#8a7140'; l.style.boxShadow = 'none'; l.textContent = 'OUT'; l.style.opacity = '1'; }\n      if (mode === 'ok')     { l.style.background = '#2a1f0c'; l.style.borderColor = '#f6a93b'; l.style.color = '#ffe2b0'; l.style.boxShadow = '0 0 26px rgba(246,169,59,.85)'; l.textContent = '✓'; l.style.opacity = '1'; }\n    }\n  }\n\n  pulseX(T, geom, elapsed) {\n    if (elapsed >= T.total) return geom.lampMid;\n    let i = 0;\n    for (let k = 0; k < T.ms.length; k++) { if (elapsed >= T.cum[k]) i = k; }\n    const frac = Math.min(1, (elapsed - T.cum[i]) / T.ms[i]);\n    const g = geom.gates[i];\n    return g.left + frac * g.width;\n  }\n\n  spawnToken(track, x0, x1, opts = {}) {\n    const { color = '#f6a93b', size = 12, yOff = 0, dur = 420, fade = 320 } = opts;\n    const lane = this.dom[track].lane;\n    const t = document.createElement('div');\n    const half = size / 2;\n    t.style.cssText = `position:absolute;top:50%;left:${x0}px;margin-top:${yOff - half}px;margin-left:-${half}px;width:${size}px;height:${size}px;border-radius:50%;background:${color};box-shadow:0 0 16px 4px ${color};opacity:1;transition:left ${dur}ms ease-in-out,opacity ${fade}ms ease-out;z-index:3;`;\n    lane.appendChild(t);\n    requestAnimationFrame(() => { t.style.left = x1 + 'px'; });\n    setTimeout(() => { t.style.opacity = '0'; }, dur);\n    setTimeout(() => { t.remove(); }, dur + fade + 80);\n  }\n\n  // --- main loop -----------------------------------------------------\n  loop = (now) => {\n    if (this.lastNow == null) this.lastNow = now;\n    let dt = now - this.lastNow;\n    this.lastNow = now;\n    if (dt > 60) dt = 60;\n    if (this.state.running) this.t += dt;\n\n    this.updateSync();\n    this.updateST();\n\n    this._raf = requestAnimationFrame(this.loop);\n  };\n\n  updateSync() {\n    const track = 'sync', T = this.sync, d = this.dom.sync;\n    if (T.cycleStart == null) this.startCycle(track);\n    const geom = T.geom;\n\n    // post-sample hold: freeze the result for a beat, then start fresh\n    if (T.sampled) {\n      if (this.t >= T.holdUntil) this.startCycle(track);\n      return;\n    }\n\n    const elapsed = this.t - T.cycleStart;\n\n    // pulse\n    d.pulse.style.opacity = elapsed < T.total ? '1' : '0';\n    d.pulse.style.left = this.pulseX(T, geom, elapsed) + 'px';\n\n    // gate glow + done\n    let active = -1;\n    for (let k = 0; k < T.ms.length; k++) {\n      if (elapsed >= T.cum[k] && elapsed < T.cum[k] + T.ms[k]) active = k;\n      if (elapsed >= T.cum[k] + T.ms[k]) d.dones[k].style.opacity = '1';\n    }\n    d.gates.forEach((g, k) => k === active ? this.glowGate(track, g) : this.clearGate(track, g));\n\n    // clock bar\n    const cx = Math.min(geom.laneW, (elapsed / T.period) * geom.laneW);\n    d.clock.style.left = cx + 'px';\n    if (d.clockLabel) d.clockLabel.style.left = cx + 'px';\n\n    // status / idle waiting\n    if (elapsed >= T.total) {\n      this.setLamp(track, 'wait');\n      const idleMs = Math.round(T.period - T.total);\n      d.status.textContent = `answer ready — clock won't tick for ${idleMs}ms · idle, waiting…`;\n      d.status.style.color = '#5e7aa0';\n    } else {\n      d.status.textContent = 'computing… clock is counting down';\n      d.status.style.color = '#6c7a96';\n    }\n\n    // sample at clock edge\n    if (elapsed >= T.period) {\n      const ok = T.total <= T.period;\n      d.pulse.style.opacity = '0';\n      d.gates.forEach((g) => this.clearGate(track, g));\n      this.setLamp(track, ok ? 'ok' : 'err');\n      d.status.textContent = ok ? 'clock tick → answer read · correct ✓' : 'clock tick → answer NOT ready · WRONG ✗';\n      d.status.style.color = ok ? '#6fb4ff' : '#ff5470';\n      if (!ok) { d.lane.style.animation = 'shake .3s'; setTimeout(() => { d.lane.style.animation = ''; }, 320); }\n      this.setState((s) => ({\n        syncDone: s.syncDone + 1,\n        syncErr: s.syncErr + (ok ? 0 : 1),\n        syncSum: s.syncSum + T.period,   // sync always pays the full clock period\n        syncN: s.syncN + 1,\n      }));\n      T.sampled = true;\n      T.holdUntil = this.t + 460;\n    }\n  }\n\n  updateST() {\n    const track = 'st', T = this.st, d = this.dom.st;\n    if (T.cycleStart == null) this.startCycle(track);\n    const geom = T.geom;\n    const elapsed = this.t - T.cycleStart;\n\n    d.pulse.style.opacity = elapsed < T.total ? '1' : '0';\n    d.pulse.style.left = this.pulseX(T, geom, elapsed) + 'px';\n\n    let active = -1;\n    for (let k = 0; k < T.ms.length; k++) {\n      if (elapsed >= T.cum[k] && elapsed < T.cum[k] + T.ms[k]) active = k;\n      if (elapsed >= T.cum[k] + T.ms[k] && d.dones[k].style.opacity !== '1') {\n        d.dones[k].style.opacity = '1';\n        const from = geom.gates[k].mid;\n        const to = (k < geom.gates.length - 1) ? geom.gates[k + 1].mid : geom.lampMid;\n        // forward \"done\" token carrying the data + request (slow enough to watch)\n        this.spawnToken(track, from, to, { dur: 460, size: 13, color: '#f6a93b' });\n        // acknowledge travels back along the dotted handshake line\n        setTimeout(() => this.spawnToken('st', to, from, { dur: 380, size: 7, yOff: 9, fade: 240, color: '#caa15a' }), 260);\n      }\n    }\n    d.gates.forEach((g, k) => k === active ? this.glowGate(track, g) : this.clearGate(track, g));\n\n    if (elapsed < T.total) {\n      d.status.textContent = 'computing… each gate signals the next when done';\n      d.status.style.color = '#9d8657';\n    } else if (!T.ready) {\n      T.ready = true;\n      this.setLamp(track, 'ok');\n      d.status.textContent = 'last token arrived → answer ready · correct ✓';\n      d.status.style.color = '#f6a93b';\n      this.setState((s) => ({ stDone: s.stDone + 1, stSum: s.stSum + T.total, stN: s.stN + 1 }));\n    } else if (elapsed >= T.total + this.GAP) {\n      this.startCycle(track);\n    }\n  }\n\n  // --- controls ------------------------------------------------------\n  onSpeed = (e) => { this.setState({ speed: parseFloat(e.target.value) }); };\n  onToggleRun = () => { this.setState((s) => ({ running: !s.running })); };\n  onToggleRandomize = () => { this.setState((s) => ({ randomize: !s.randomize })); };\n  onReset = () => {\n    this.setState({ syncDone: 0, syncErr: 0, syncSum: 0, syncN: 0, stDone: 0, stSum: 0, stN: 0 });\n  };\n  setDelay = (i, v) => {\n    this.setState((s) => { const d = s.delays.slice(); d[i] = v; return { delays: d }; });\n  };\n\n  renderVals() {\n    const s = this.state;\n    const fmt = (sum, n) => n > 0 ? (sum / n / 1000).toFixed(2) + 's' : '—';\n    const syncAvg = s.syncN ? s.syncSum / s.syncN : 0;\n    const stAvg = s.stN ? s.stSum / s.stN : 0;\n\n    let verdict;\n    if (s.syncN < 1) {\n      verdict = 'Watch a few cycles. Then hit “Randomize delays” to see what happens when the real world refuses to cooperate.';\n    } else if (s.randomize && s.syncErr > 0) {\n      const faster = stAvg < syncAvg ? `${Math.round((1 - stAvg / syncAvg) * 100)}% faster on average` : 'faster';\n      verdict = `Synchronous has dropped ${s.syncErr} answer${s.syncErr === 1 ? '' : 's'} — read before ready. Self-timed: 0 errors, ${faster}, because it only ever waits as long as the work actually takes.`;\n    } else if (s.randomize) {\n      verdict = 'Jitter is on. The synchronous clock is fixed to a worst-case budget; if any cycle overruns it, that answer is wrong. Self-timed just waits for the real finish.';\n    } else {\n      verdict = 'No errors yet — every cycle fits inside the clock budget. Notice the synchronous track sits idle, waiting for the tick, while self-timed finishes and moves on. Now try randomizing.';\n    }\n\n    return {\n      setRoot: this.setRoot,\n      gateList: [{ n: 1 }, { n: 2 }, { n: 3 }, { n: 4 }],\n      gateKnobs: s.delays.map((v, i) => ({\n        label: `Gate ${i + 1}`,\n        value: v,\n        display: `${v}u`,\n        onChange: (e) => this.setDelay(i, parseInt(e.target.value, 10)),\n      })),\n      speed: s.speed,\n      speedLabel: `${s.speed.toFixed(1)}×`,\n      onSpeed: this.onSpeed,\n      runLabel: s.running ? '⏸ pause' : '▶ play',\n      onToggleRun: this.onToggleRun,\n      onReset: this.onReset,\n      onToggleRandomize: this.onToggleRandomize,\n      randState: s.randomize ? 'ON' : 'OFF',\n      randBg: s.randomize ? '#3a2a0c' : '#101725',\n      randBorder: s.randomize ? '#f6a93b' : '#2a3a5c',\n      randColor: s.randomize ? '#ffd99a' : '#cdd8ec',\n      sync: {\n        completed: s.syncDone,\n        errors: s.syncErr,\n        errColor: s.syncErr > 0 ? '#ff5470' : '#e6edf7',\n        avg: fmt(s.syncSum, s.syncN),\n      },\n      st: {\n        completed: s.stDone,\n        errors: 0,\n        avg: fmt(s.stSum, s.stN),\n      },\n      verdict,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
